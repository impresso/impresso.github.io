<section
  id="Timeline"
  class="position-relative mx-5 border-dark border-start border-end"
>
  <div id="Timeline__activeArea"></div>
  <div id="Timeline__past"></div>
  <div id="Timeline__xAxis"></div>

  <div id="Timeline__startDate"></div>
  <div id="Timeline__endDate"></div>

  <div id="Timeline__pointer">
    <div id="Timeline__pointerDate"></div>
  </div>

  <div id="Timeline__rail"></div>
  <div id="Timeline__now">
    <div id="Timeline__nowDate"></div>
  </div>
  <div id="Timeline__tooltipMarker"></div>
  <div id="Timeline__tooltip"></div>
</section>
<noscript>
  <ul>
    {% for item in site.events %}
    <li>
      {{ item.title }} - {{ item.human_date }}
      <a href="{{ item.url }}">link</a>
    </li>
    {% endfor %}
  </ul>
</noscript>

<script>
  const timelineElement = document.querySelector('#Timeline')
  const timelineActiveArea = document.querySelector('#Timeline__activeArea')
  const timelineXAxis = document.querySelector('#Timeline__xAxis')
  const timelineStartDateEl = document.querySelector('#Timeline__startDate')
  const timelineEndDateEl = document.querySelector('#Timeline__endDate')
  const timelinePointer = document.querySelector('#Timeline__pointer')
  const timelinePointerDate = document.querySelector('#Timeline__pointerDate')
  const timelineRail = document.querySelector('#Timeline__rail')
  const timelineNow = document.querySelector('#Timeline__now')
  const timelineNowDate = document.querySelector('#Timeline__nowDate')
  const timelinePast = document.querySelector('#Timeline__past')
  const timelineTooltip = document.querySelector('#Timeline__tooltip')
  const timelineTooltipMarker = document.querySelector('#Timeline__tooltipMarker')

  let timelineBoundingClientRect = timelineElement.getBoundingClientRect()
  let closestItem = null

  // TODO: get these constants from config
  const timelineStartDate = new Date('2023-08-01')
  const timelineEndDate = new Date('2027-09-01')
  timelineStartDateEl.innerHTML = timelineStartDate.getFullYear()
  timelineEndDateEl.innerHTML = timelineEndDate.getFullYear()

  // The pivot point for the sqrt scale — always "now"
  const timelineNowDate_val = new Date()

  const items = JSON.parse(
    '[{% for item in site.events %}{ "title":"{{item.title | escape}}", "url": "{{item.url}}", "humanDate": "{{item.human_date}}", "startDate": "{{item.start_date}}", "endDate": "{{item.end_date}}"}{% unless forloop.last %},{% endunless %}{% endfor %}]'
  ).map((item) => {
    item.startDate = new Date(item.startDate)
    item.endDate = new Date(item.endDate)
    item.disabled = true // item.endDate > new Date()
    return item
  })

  // ---------------------------------------------------------------------------
  // Sqrt scale helpers
  // Dates close to "now" are spread further apart; distant dates are compressed.
  // The scale is: signedSqrt(date - now), mapped linearly to the pixel range.
  // ---------------------------------------------------------------------------

  function signedSqrt(ms) {
    return Math.sign(ms) * Math.sqrt(Math.abs(ms))
  }

  // Pre-compute the sqrt-space boundaries (these are constant)
  const sqrtStart = signedSqrt(timelineStartDate - timelineNowDate_val)
  const sqrtEnd   = signedSqrt(timelineEndDate   - timelineNowDate_val)
  const sqrtRange = sqrtEnd - sqrtStart

  // Convert a Date to a pixel offset from the left edge of the timeline
  function dateToPx(date) {
    const w  = timelineBoundingClientRect.width
    const sq = signedSqrt(date - timelineNowDate_val)
    return ((sq - sqrtStart) / sqrtRange) * w
  }

  // Convert a pixel offset back to a Date (used for the hover pointer label)
  function pxToDate(px) {
    const w  = timelineBoundingClientRect.width
    const sq = sqrtStart + (px / w) * sqrtRange
    const ms = Math.sign(sq) * sq * sq
    return new Date(timelineNowDate_val.getTime() + ms)
  }

  // ---------------------------------------------------------------------------

  function handleMouseMove(event) {
    const mouseX = event.clientX - timelineBoundingClientRect.left

    if (mouseX > 0 && mouseX < timelineBoundingClientRect.width) {
      const date = pxToDate(mouseX)
      timelinePointer.style.opacity = 1
      timelinePointer.style.transform = `translate(${mouseX}px, 0)`
      timelinePointerDate.innerHTML =
        '<span>' +
        date.toLocaleDateString('en-GB', {
          weekday: 'short',
          day: 'numeric',
          month: 'short',
          year: 'numeric',
        }) +
        '</span>'
    } else {
      timelinePointer.style.opacity = 0
    }

    // get closest item by pixel distance (works correctly with the sqrt scale)
    const mx = event.clientX - timelineBoundingClientRect.left
    closestItem = items.reduce((prev, curr) => {
      const prevDiff = Math.abs(dateToPx(prev.startDate) - mx)
      const currDiff = Math.abs(dateToPx(curr.startDate) - mx)
      return prevDiff < currDiff ? prev : curr
    })
    drawTooltipAtItem(closestItem)
  }

  timelineActiveArea.addEventListener('mousemove', handleMouseMove)
  timelineRail.addEventListener('mousemove', handleMouseMove)
  timelineRail.addEventListener('click', (event) => {
    const idx = event.target.getAttribute('data-idx')
    if (!isNaN(idx)) {
      const item = items[idx]
      if (item.disabled) return
      window.location.href = item.url
    }
  })
  timelineElement.addEventListener('mouseleave', () => {
    timelinePointer.style.opacity = 0
  })
  timelineElement.addEventListener('click', () => {
    if (closestItem && !closestItem.disabled) {
      window.location.href = closestItem.url
    }
  })
  window.addEventListener('resize', () => {
    timelineBoundingClientRect = timelineElement.getBoundingClientRect()
    drawTimeline()
    drawAxis()
  })

  function drawTooltipAtItem(item) {
    timelineTooltip.innerHTML = `
      <div class="Timeline__tooltip__title">${item.title}</div>
      <div class="Timeline__tooltip__date">${item.humanDate}</div>
    `
    const itemStartPx = dateToPx(item.startDate)
    const itemEndPx   = dateToPx(item.endDate)
    const tooltipX    = Math.min(
      timelineBoundingClientRect.width - 200,
      itemStartPx - 3
    )

    timelineTooltip.style.opacity = 1
    timelineTooltip.style.transform = `translate(${tooltipX}px, 0)`

    timelineTooltipMarker.style.opacity = 1
    timelineTooltipMarker.style.transform = `translate(${itemStartPx}px, 0)`
    timelineTooltipMarker.style.width = `${Math.max(2, itemEndPx - itemStartPx)}px`
  }

  function drawAxis() {
    while (timelineXAxis.firstChild) {
      timelineXAxis.removeChild(timelineXAxis.firstChild)
    }

    // Month ticks (no label)
    let m = new Date(timelineStartDate.getFullYear(), timelineStartDate.getMonth(), 1)
    while (m <= timelineEndDate) {
      const isJanuary = m.getMonth() === 0
      if (!isJanuary) { // year ticks are drawn separately below
        const monthEl = document.createElement('div')
        monthEl.classList.add('Timeline__month')
        monthEl.style.left = dateToPx(m) + 'px'
        timelineXAxis.appendChild(monthEl)
      }
      m = new Date(m.getFullYear(), m.getMonth() + 1, 1)
    }

    // Year ticks (with label)
    let year = timelineStartDate.getFullYear() + 1
    while (year <= timelineEndDate.getFullYear()) {
      const yearEl = document.createElement('div')
      yearEl.classList.add('Timeline__year')
      yearEl.innerHTML = '<span>' + year + '</span>'
      yearEl.style.left = dateToPx(new Date(year, 0, 1)) + 'px'
      timelineXAxis.appendChild(yearEl)
      year++
    }
  }

  function drawTimeline() {
    const now   = new Date()
    const nowPx = dateToPx(now)

    timelineNow.style.left = nowPx + 'px'
    timelineNowDate.innerHTML =
      '<span>' +
      now.toLocaleDateString('en-GB', {
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        year: 'numeric',
      }) +
      '</span>'

    // Shade everything to the left of "now"
    timelinePast.style.left  = '0'
    timelinePast.style.right = (timelineBoundingClientRect.width - nowPx) + 'px'

    while (timelineRail.firstChild) {
      timelineRail.removeChild(timelineRail.firstChild)
    }

    items.forEach((item, i) => {
      const x1 = dateToPx(item.startDate)
      const x2 = dateToPx(item.endDate)
      const itemEl = document.createElement('div')
      itemEl.classList.add('Timeline__item')
      if (item.disabled) {
        itemEl.classList.add('disabled')
      }
      itemEl.setAttribute('data-idx', i)
      // Use left + width instead of left + right so the sqrt warping is applied
      // to both edges independently
      itemEl.style.left  = x1 + 'px'
      itemEl.style.width = Math.max(2, x2 - x1) + 'px'
      timelineRail.appendChild(itemEl)
    })
  }

  drawTimeline()
  drawAxis()

  // Show tooltip for the event closest to today on page load
  const todayClosestItem = items.reduce((prev, curr) => {
    const prevDiff = Math.abs(prev.startDate - new Date())
    const currDiff = Math.abs(curr.startDate - new Date())
    return prevDiff < currDiff ? prev : curr
  })
  drawTooltipAtItem(todayClosestItem)
</script>
<style>
  #Timeline {
    --timeline-height-50: 20px;
    --timeline-height: 40px;
    height: var(--timeline-height);
    margin-top: 70px;
    margin-bottom: 60px;
    background: var(--bs-light);
    font-size: 0.8rem;
  }
  #Timeline__activeArea {
    position: absolute;
    top: -80px;
    bottom: -80px;
    left: 0;
    right: 0;
    pointer-events: auto;
  }
  #Timeline__startDate,
  #Timeline__endDate {
    position: absolute;
    top: 50%;
    line-height: 20px;
    margin-top: -10px;
    font-size: inherit;
    font-weight: bold;
    color: var(--bs-dark);
    width: 3rem;
  }
  #Timeline__startDate {
    left: -3rem;
    padding-right: 0.5rem;
    text-align: right;
  }
  #Timeline__endDate {
    right: -3rem;
    padding-left: 0.5rem;
    text-align: left;
  }
  #Timeline__pointer {
    position: absolute;
    top: -90px;
    bottom: -10px;
    left: 0;
    opacity: 0;
    will-change: transform, opacity;
    transition: transform 0.2s ease-out, opacity 0.2s ease-out;
    transform: translate(0, 0);
    width: 1.5px;
    background: var(--bs-dark);
    pointer-events: none;
  }
  #Timeline__pointerDate {
    position: absolute;
    left: 0;
    text-align: center;
    height: 20px;
    line-height: 20px;
    color: var(--bs-dark);
    font-size: inherit;
    font-weight: bold;
    padding: 0.5rem;
    pointer-events: none;
    top: -25px;
    margin-left: -75px;
    width: 150px;
  }
  #Timeline__now {
    position: absolute;
    top: -10px;
    bottom: -10px;
    left: 0;
    width: 1.5px;
    background: var(--bs-dark);
    animation: blinker 1s linear infinite;
    pointer-events: none;
  }
  #Timeline__nowDate {
    position: absolute;
    bottom: -40px;
    text-align: center;
    margin-left: -75px;
    height: 25px;
    line-height: 25px;
    width: 150px;
    color: var(--bs-dark);
    font-size: inherit;
    font-weight: bold;
    padding: 0;
  }
  #Timeline__nowDate > span {
    border-bottom: 2px solid var(--bs-dark);
  }
  @keyframes blinker {
    50% {
      background-color: transparent;
    }
  }
  #Timeline__past {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    background-color: var(--bs-primary-transparent);
    border: 1px solid var(--bs-primary-transparent);
    z-index: 0;
    pointer-events: none;
  }
  #Timeline__tooltip {
    position: absolute;
    top: -87px;
    left: 0;
    will-change: transform, opacity;
    transition: transform 0.2s cubic-bezier(0.455, 0.03, 0.515, 0.955),
      opacity 0.2s ease-out;
    transform: translate(0, 0);
    max-width: 250px;
    background: var(--bs-light);
    padding: 0.5rem;
    border-radius: 4px;
    pointer-events: none;
    border: 2px solid var(--bs-dark);
  }
  #Timeline__tooltipMarker {
    position: absolute;
    top: -3px;
    bottom: -3px;
    left: 0;
    background: var(--bs-primary);
    border: 2px solid var(--bs-dark);
    opacity: 1;
    will-change: transform, opacity;
    transition: opacity 0.2s ease-out;
    transform: translate(0, 0);
    padding: 0 1px 0 3px;
    border-radius: 2px;
    pointer-events: none;
  }
  .Timeline__tooltip__title {
    font-weight: bold;
  }
  .Timeline__item {
    height: var(--timeline-height);
    position: absolute;
    top: 0;
    bottom: 0;
    background-color: var(--bs-dark-transparent);
    border-radius: 2px;
    border: 1px solid var(--bs-dark-transparent);
    cursor: pointer;
  }
  .Timeline__item.disabled {
    background-color: var(--bs-dark-transparent);
    border-color: var(--bs-dark-transparent);
    cursor: not-allowed;
  }
  .Timeline__item:hover {
    background-color: var(--bs-dark);
    border-color: var(--bs-dark);
  }
  .Timeline__month {
    position: absolute;
    top: 25%;
    bottom: 0;
    border-left: 1px dotted var(--bs-dark);
    opacity: 0.3;
  }
  .Timeline__year {
    position: absolute;
    top: 0;
    bottom: -10px;
    line-height: var(--timeline-height-50);
    text-align: center;
    color: var(--bs-dark);
    font-size: inherit;
    border-left: 1px dotted var(--bs-dark);
  }
  .Timeline__year span {
    position: absolute;
    font-size: 0.8rem;
    bottom: -20px;
  }
</style>
